<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="scaffolded-by" content="https://github.com/schultek/jaspr" />

    <!-- Resolve all asset URLs from the site root, so deep links like
         /sample/contact_card still load main.dart.js, flutter_bootstrap.js, and
         the Flutter assets (which would otherwise be requested under /sample/). -->
    <base href="/" />

    <title>A2UI Craft</title>

    <!-- Material Icons web font, so the Jaspr `Icon` ligatures (class
         "material-icons") render as glyphs instead of literal text. -->
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />

    <!-- The generated CSS (all @css declarations from your components). -->
    <link rel="stylesheet" href="main.css" />

    <!-- The site's own chrome palette. Every pair resolves through CSS
         `light-dark()` against the root's `color-scheme`, which defaults to
         the browser/system preference and can be overridden by the global
         theme toggle (an inline `color-scheme: light|dark` on <html>, set by
         SiteTheme). A media query could not do this — it only sees the
         browser preference, never the override. (Sample surfaces are themed
         separately, by their project theme.) -->
    <style>
      :root {
        color-scheme: light dark;
        --bg: light-dark(#ffffff, #202124);
        --fg: light-dark(#333333, #e8eaed);
        --muted: light-dark(#555555, #bdc1c6);
        --subtle: light-dark(#888888, #9aa0a6);
        --faint: light-dark(#bbbbbb, #5f6368);
        --border: light-dark(#eeeeee, #3c4043);
        --border-strong: light-dark(#cccccc, #5f6368);
        --panel: light-dark(#fafafa, #28292c);
        --card: light-dark(#ffffff, #2a2b2e);
        --accent: light-dark(#1a73e8, #8ab4f8);
        --accent-fg: light-dark(#ffffff, #202124);
        --error-bg: light-dark(#fdecea, #3c1d1b);
        --error-fg: light-dark(#b3261e, #f2b8b5);
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
      }

      /* The back-to-gallery button: a borderless pill whose arrow rides in a
         circular badge. On hover the pill fills faintly, the badge lights up in
         the accent, and the arrow nudges left — a "go back" micro-interaction. */
      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        padding: 5px 15px 5px 5px;
        border: none;
        border-radius: 999px;
        background: transparent;
        color: var(--muted);
        font: 500 14px system-ui, -apple-system, sans-serif;
        cursor: pointer;
        transition: background 0.15s ease, color 0.15s ease;
      }
      .back-btn:hover {
        background: var(--panel);
        color: var(--fg);
      }
      .back-btn:active {
        transform: scale(0.98);
      }
      .back-btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }
      .back-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 1px solid var(--border-strong);
        font-size: 15px;
        line-height: 1;
        transition: border-color 0.15s ease, color 0.15s ease,
          background 0.15s ease, transform 0.2s ease;
      }
      .back-btn:hover .back-badge {
        border-color: var(--accent);
        color: var(--accent);
        background: color-mix(in srgb, var(--accent) 12%, transparent);
        transform: translateX(-3px);
      }
    </style>

    <!-- The Flutter manifest + bootstrap (embedded Flutter). -->
    <link rel="manifest" href="manifest.json" />
    <script src="flutter_bootstrap.js" async></script>

    <!-- The compiled Jaspr client entrypoint (web/main.dart). -->
    <script defer src="main.dart.js"></script>
  </head>
  <body></body>
</html>
