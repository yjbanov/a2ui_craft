name: a2ui_craft_jaspr
description: Jaspr bindings for A2UI Craft (Remote Flutter Widgets format)
version: 0.0.1

environment:
  sdk: ^3.6.0

resolution: workspace

dependencies:
  a2ui_craft: ^0.0.1
  a2ui_craft_bridge: ^0.0.1
  a2ui_core: any
  jaspr: ^0.23.1

dev_dependencies:
  a2ui_craft_testing: ^0.0.1
  jaspr_test: ^0.23.1
  # The custom-catalog test and a2ui_core seam spike define component schemas.
  json_schema_builder: any
  lints: ^4.0.0
  # The Flex geometry conformance runs in a headless browser and reads real DOM
  # layout via getBoundingClientRect (dart test -p chrome).
  universal_web: any
