name: a2ui_craft_flutter
description: Flutter bindings for A2UI Craft (Remote Flutter Widgets format).
version: 0.0.1

environment:
  sdk: ^3.6.0

resolution: workspace

dependencies:
  a2ui_craft: ^0.0.1
  a2ui_craft_bridge: ^0.0.1
  a2ui_core: any
  flutter:
    sdk: flutter

dev_dependencies:
  a2ui_craft_testing: ^0.0.1
  flutter_test:
    sdk: flutter
  # The custom-catalog test defines its own a2ui_core component schemas.
  json_schema_builder: any
  lints: ^4.0.0
