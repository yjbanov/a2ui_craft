  catalog, A2UI messages, and action handler) used by the Flutter and Jaspr
  example galleries. Test/demo only; not published.
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.6.0

resolution: workspace

dependencies:
  a2ui_core: any
  a2ui_craft: any

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0
