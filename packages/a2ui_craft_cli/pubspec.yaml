name: a2ui_craft_cli
description: >-
  Command-line front-end for the A2UI Craft compiler. Provides the `craft`
  executable, which can be AOT-compiled to a standalone binary for
  distribution.
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.6.0

resolution: workspace

dependencies:
  a2ui_craft: any

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0

# Allows `dart pub global activate` users to run `craft`.
executables:
  craft: craft
