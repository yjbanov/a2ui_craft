name: site
description: The A2UI Craft demo site — a Jaspr app with Flutter embedded.
publish_to: none

environment:
  sdk: ^3.6.0

resolution: workspace

dependencies:
  a2ui_core: any
  a2ui_craft: ^0.0.1
  a2ui_craft_bridge: ^0.0.1
  a2ui_craft_examples: ^0.0.1
  a2ui_craft_flutter: ^0.0.1
  a2ui_craft_jaspr: ^0.0.1
  flutter:
    sdk: flutter
  jaspr: ^0.23.1
  jaspr_flutter_embed: any
  jaspr_router: any
  web: ^1.0.0

dev_dependencies:
  build_runner: ^2.15.0
  build_web_compilers: ^4.4.6
  jaspr_builder: ^0.23.1
  lints: ^4.0.0

jaspr:
  mode: client
  # Embed Flutter (via jaspr_flutter_embed) so a sample can render on the Flutter
  # adapter inside the Jaspr host.
  flutter: embedded

flutter:
  # Bundle the Material Icons font into the embedded Flutter build so `Icon`
  # glyphs render instead of tofu boxes (mirrors the Flutter example app).
  uses-material-design: true
