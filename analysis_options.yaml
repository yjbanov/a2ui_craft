include: package:lints/recommended.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Treat unused code as an error to keep the codebase tidy as it grows.
    unused_import: error
    unused_local_variable: error

linter:
  rules:
    - prefer_final_locals
    - prefer_final_in_for_each
    - directives_ordering
    - unawaited_futures
