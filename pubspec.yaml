# Root of the A2UI Craft pub workspace (monorepo).
#
# This is not a publishable package. It exists to tie together all of the
# member packages under `packages/` so that a single `dart pub get` resolves
# them with a shared lockfile, and so shared dev tooling versions stay in sync.
#
# See https://dart.dev/tools/pub/workspaces for how Dart workspaces work.
name: _a2ui_craft_workspace
publish_to: none

environment:
  sdk: ^3.6.0

# Every package in the workspace. New packages should be added here.
workspace:
  - packages/a2ui_craft
  - packages/a2ui_craft_bridge
  - packages/a2ui_craft_testing
  - packages/a2ui_craft_jaspr
  - packages/a2ui_craft_jaspr/example
  - packages/a2ui_craft_flutter
  - packages/a2ui_craft_flutter/example
  - packages/a2ui_craft_examples
  - site
  - tool/testing

# Dev dependencies declared here are shared by all workspace members.
dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0

# Workspace-wide override: A2UI Craft layers the A2UI protocol/data model on
# `a2ui_core`. It is pulled from git so the workspace tracks the latest and so
# others can run the repo without a local checkout. Switch to a hosted version
# once the a2ui_core team cuts a release. (`resolution: workspace` in a2ui_core
# does not block a git dependency.)
dependency_overrides:
  a2ui_core:
    git:
      url: https://github.com/flutter/genui.git
      path: packages/a2ui_core
