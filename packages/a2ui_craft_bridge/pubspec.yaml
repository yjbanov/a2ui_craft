name: a2ui_craft_bridge
description: >-
  Renders A2UI Transport surfaces with the A2UI Craft engine. Translates an A2UI
  catalog component tree and data model into the RFW model that the framework
  adapters render. Framework-neutral (no UI-framework dependency).
version: 0.0.1

environment:
  sdk: ^3.6.0

resolution: workspace

dependencies:
  a2ui_craft: ^0.0.1

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0
