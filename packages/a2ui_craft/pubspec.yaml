name: a2ui_craft
description: >-
  The framework-agnostic core of A2UI Craft: parsing, data modeling, and the
  binary format for the RFW template language. Pure Dart with no UI-framework
  dependency, so the same templates can be rendered by any framework adapter
  (Flutter, Jaspr, ...).
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.6.0

resolution: workspace

# Keep this package dependency-light. The core must remain free of any
# UI-framework dependency so adapters can build on it for any framework.
dependencies:
  meta: ^1.15.0

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0
