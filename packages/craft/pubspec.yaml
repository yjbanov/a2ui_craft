name: craft
description: >-
  The A2UI Craft CLI — scaffold and manage ephemeral, data-only UI projects that
  deploy to a CDN and load into a host app at runtime.
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.6.0

resolution: workspace

executables:
  craft:

dependencies:
  args: ^2.4.0
  path: ^1.9.0

dev_dependencies:
  a2ui_craft: any
  a2ui_craft_examples: any
  lints: ^4.0.0
  test: ^1.25.0
